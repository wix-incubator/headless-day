<svg xmlns="http://www.w3.org/2000/svg" width="42" height="50" viewBox="0 0 42 50">
  <defs>
    <radialGradient id="flame" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#eafff0"/>
      <stop offset="40%" stop-color="#7dff5f"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ghostly glow the lantern casts -->
  <ellipse cx="21" cy="31" rx="19" ry="19" fill="url(#halo)"/>

  <!-- bail handle + top ring, as if carried by hand -->
  <path d="M13 15 C13 6 29 6 29 15" fill="none" stroke="#3b2f2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="21" cy="5" r="2.6" fill="none" stroke="#3b2f2a" stroke-width="2"/>

  <!-- roof cap -->
  <path d="M12 16 L30 16 L27 11 L15 11 Z" fill="#5b4a40" stroke="#2a211d" stroke-width="1" stroke-linejoin="round"/>
  <rect x="11" y="16" width="20" height="3" rx="1" fill="#6b574b" stroke="#2a211d" stroke-width="1"/>

  <!-- glass chamber -->
  <rect x="12.5" y="19.5" width="17" height="19.5" rx="2" fill="#0e1a17" stroke="#3b2f2a" stroke-width="2"/>

  <!-- flame glow + core -->
  <ellipse cx="21" cy="30" rx="9" ry="10" fill="url(#flame)"/>
  <path d="M21 23 C24 27 24 31 21 35 C18 31 18 27 21 23 Z" fill="#eafff0"/>

  <!-- frame bars -->
  <line x1="21" y1="19.5" x2="21" y2="39" stroke="#3b2f2a" stroke-width="1.1" opacity="0.65"/>

  <!-- base -->
  <path d="M11 39 L31 39 L28 44 L14 44 Z" fill="#5b4a40" stroke="#2a211d" stroke-width="1" stroke-linejoin="round"/>
</svg>
